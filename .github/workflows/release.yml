name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run typecheck

      - name: Version and Build
        id: versioning
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # AUTO-CHANGESET: Create if missing
          mkdir -p .changeset
          if [ -z "$(ls .changeset/*.md 2>/dev/null)" ]; then
            echo "Auto-generating changeset..."
            COMMIT_MSG=$(git log -1 --pretty=%B)
            BUMP_TYPE="patch"
            if [[ "$COMMIT_MSG" == feat:* ]]; then BUMP_TYPE="minor"; fi
            {
              echo "---"
              echo "\"@arkpad/core\": $BUMP_TYPE"
              echo "\"@arkpad/react\": $BUMP_TYPE"
              echo "---"
              echo ""
              echo "$COMMIT_MSG"
            } > .changeset/auto-generated.md
          fi
          
          # 1. Version the packages
          npm run version-packages
          
          # 2. Check for changes
          if [ -n "$(git status --porcelain)" ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
            git add .
            git commit -m "chore: automated versioning [skip ci]"
            git push origin main
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi
          
          # 3. Build (Always build to ensure demo is updated)
          npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        if: steps.versioning.outputs.HAS_CHANGES == 'true'
        run: |
          # Publish using OIDC (Trusted Publishing)
          npm run release
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Deploy Demo
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/arkpad/dist
