name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build packages
        run: npm run build

      - name: Create Release and Publish
        id: changesets
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Version the packages (consumes changesets)
          npm run version-packages
          
          # Check if there were changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected, committing and publishing..."
            git add .
            git commit -m "chore: version packages"
            git push origin main
            
            # Publish to NPM and create tags
            npm run release
          else
            echo "No changesets found, skipping release."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
