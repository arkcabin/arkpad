name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Update NPM
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Preflight Build
        run: npm run build

      - name: Version Packages
        run: |
          # 1. If no manual changesets exist, create a smart automated patch changeset
          if [ ! -f .changeset/*.md ] || [ "$(ls -A .changeset/*.md 2>/dev/null | grep -v 'README.md')" = "" ]; then
            echo "No manual changesets found. Running Pro-Max auto-detection..."
            
            # Determine the base SHA for comparison (entire push history)
            BASE_SHA="${{ github.event.before }}"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
              BASE_SHA="HEAD^"
            fi
            
            echo "---" > .changeset/automated-release.md
            
            # Dynamically detect all packages and check for meaningful code changes
            ANY_CHANGED=false
            for pkg_dir in packages/*; do
              if [ -d "$pkg_dir" ] && [ -f "$pkg_dir/package.json" ]; then
                PKG_NAME=$(node -p "require('./$pkg_dir/package.json').name")
                
                # Check for changes in this package, ignoring docs and tests
                # This ensures we don't release new versions for just README fixes
                PKG_CHANGES=$(git diff --name-only $BASE_SHA HEAD -- "$pkg_dir" | grep -vE "\.(md|txt|test\.ts|test\.js)$" || true)
                
                if [ -n "$PKG_CHANGES" ]; then
                   echo "\"$PKG_NAME\": patch" >> .changeset/automated-release.md
                   ANY_CHANGED=true
                   echo "Detected code changes in $PKG_NAME"
                fi
              fi
            done
            
            echo "---" >> .changeset/automated-release.md
            echo "" >> .changeset/automated-release.md
            echo "automated release: code changes detected via CI" >> .changeset/automated-release.md
            
            # Only keep the file if at least one package actually had code changes
            if [ "$ANY_CHANGED" = false ]; then
              rm .changeset/automated-release.md
              echo "No meaningful code changes detected in any package. Skipping auto-versioning."
            fi
          fi

          # 2. Bump versions locally based on changesets
          npx changeset version
          
          # 2. Commit and push version bumps back to main (if any)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "release: version packages [skip ci]"
            git push
          fi
          
      - name: Publish to NPM
        run: |
          # Use native NPM workspaces publishing with explicit registry and provenance
          # This ensures OIDC is used for authentication
          npm publish --workspaces --if-present --provenance --access public --registry https://registry.npmjs.org
          
          # Create and push git tags to keep GitHub in sync with NPM
          npx changeset tag
          git push --tags
          
          # Convert the new tags into official GitHub Releases
          for tag in $(git tag --points-at HEAD); do
            gh release create "$tag" --title "$tag" --generate-notes || echo "Release for $tag already exists"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
