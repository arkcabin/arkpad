name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent multiple release jobs from running at once
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run typecheck

      - name: Build
        run: npm run build

      - name: Create Changeset if missing
        run: |
          mkdir -p .changeset
          if [ -z "$(ls .changeset/*.md 2>/dev/null)" ]; then
            echo "Auto-generating changeset..."
            COMMIT_MSG=$(git log -1 --pretty=%B)
            BUMP_TYPE="patch"
            if [[ "$COMMIT_MSG" == feat:* ]]; then BUMP_TYPE="minor"; fi
            {
              echo "---"
              echo "\"@arkpad/core\": $BUMP_TYPE"
              echo "\"@arkpad/react\": $BUMP_TYPE"
              echo "---"
              echo ""
              echo "$COMMIT_MSG"
            } > .changeset/auto-generated.md
          fi

      - name: Create Release Pull Request or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          # This will publish if versions are bumped, or create a PR if there are changesets
          publish: npx changeset publish
          version: npm run version-packages
          commit: "chore: automated versioning [skip ci]"
          title: "chore: automated versioning"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org

      - name: Deploy Demo
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/arkpad/dist
