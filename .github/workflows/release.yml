name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight Build
        run: npm run build

      - name: Version Packages
        run: |
          # 1. Bump versions locally based on changesets
          npx changeset version
          
          # 2. Commit and push version bumps back to main (if any)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "chore: version packages [skip ci]"
            git push
          fi
          
      - name: Publish to NPM
        run: |
          # Use native NPM workspaces publishing which is 100% OIDC compatible
          # This will publish @arkpad/core and @arkpad/react while skipping private apps
          npm publish --workspaces --if-present --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
